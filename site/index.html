<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Context as Code</title>
    <meta
      name="description"
      content="ACAC first instance reader built from trove markdown source."
    />
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="mobile-bar">
      <button class="icon-button" type="button" data-action="toggle-nav" aria-label="Open navigation">
        <svg class="button-icon" viewBox="0 0 20 20" aria-hidden="true">
          <path d="M4 6.5h12M4 10h12M4 13.5h12" />
        </svg>
      </button>
      <a class="mobile-brand" href="/" data-route="/">
        <span class="mobile-brand-mark" aria-hidden="true"></span>
        <span>ACAC</span>
      </a>
      <button class="icon-button" type="button" data-action="open-search-palette" aria-label="Open search">
        <svg class="button-icon" viewBox="0 0 20 20" aria-hidden="true">
          <circle cx="8.8" cy="8.8" r="4.8" />
          <path d="m12.4 12.4 3.2 3.2" />
        </svg>
      </button>
    </div>

    <div class="shell">
      <div class="nav-scrim" data-action="toggle-nav"></div>
      <aside class="sidebar" aria-label="Trove navigation">
        <header class="sidebar-header">
          <div class="sidebar-title-row">
            <a class="brand" href="/" data-route="/">
              <span class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 34 34" focusable="false">
                  <path class="brand-mark-plate" d="M17 4.8 28.2 11.4v11.2L17 29.2 5.8 22.6V11.4L17 4.8Z" />
                  <path class="brand-mark-gem" d="M17 8.4 24.8 13 17 17.6 9.2 13 17 8.4Z" />
                  <path class="brand-mark-route" d="M9.2 13v8.1L17 25.6l7.8-4.5V13M17 17.6v8" />
                </svg>
              </span>
              <span>
                <strong>ACAC</strong>
                <small>AI Context as Code</small>
              </span>
            </a>
            <button
              class="icon-button sidebar-collapse"
              type="button"
              data-action="toggle-sidebar"
              aria-label="Collapse sidebar"
              aria-expanded="true"
            >
              <svg class="button-icon sidebar-collapse-icon" viewBox="0 0 20 20" aria-hidden="true">
                <path d="m12 5-5 5 5 5" />
              </svg>
            </button>
            <button class="icon-button sidebar-close" type="button" data-action="toggle-nav" aria-label="Close navigation">
              <svg class="button-icon" viewBox="0 0 20 20" aria-hidden="true">
                <path d="m5.5 5.5 9 9M14.5 5.5l-9 9" />
              </svg>
            </button>
          </div>
          <form class="search-form" role="search">
            <label class="search-label" for="global-search">Search trove</label>
            <div class="search-box" data-action="open-search-palette">
              <svg class="search-icon" viewBox="0 0 20 20" aria-hidden="true">
                <circle cx="8.8" cy="8.8" r="4.8" />
                <path d="m12.4 12.4 3.2 3.2" />
              </svg>
              <input
                id="global-search"
                name="q"
                type="search"
                autocomplete="off"
                readonly
                data-action="open-search-palette"
                aria-haspopup="dialog"
                placeholder="Search context"
              />
              <span class="shortcut-hint" data-shortcut-hint aria-hidden="true">⌘K</span>
              <button class="search-submit" type="button" data-action="open-search-palette" aria-label="Open search palette">
                <svg class="button-icon" viewBox="0 0 20 20" aria-hidden="true">
                  <path d="M5 10h9M10.5 6.5 14 10l-3.5 3.5" />
                </svg>
              </button>
            </div>
          </form>
        </header>
        <nav id="tree" class="tree" aria-label="Source tree">
          <p class="muted">Loading source tree...</p>
        </nav>
      </aside>

      <main id="main" class="reader" tabindex="-1">
        <section class="loading-state">
          <p>Loading ACAC context...</p>
        </section>
      </main>

      <aside id="context" class="context-panel" aria-label="Current context"></aside>
    </div>

    <div id="search-palette" class="search-palette" aria-hidden="true" hidden>
      <div class="palette-backdrop" data-action="close-search-palette" aria-hidden="true"></div>
      <section class="palette-dialog" role="dialog" aria-modal="true" aria-label="Search public trove">
        <div class="palette-input-row">
          <svg class="palette-search-icon" viewBox="0 0 20 20" aria-hidden="true">
            <circle cx="8.8" cy="8.8" r="4.8" />
            <path d="m12.4 12.4 3.2 3.2" />
          </svg>
          <label class="sr-only" for="palette-search-input">Search public trove</label>
          <input
            id="palette-search-input"
            type="search"
            autocomplete="off"
            spellcheck="false"
            role="combobox"
            aria-autocomplete="list"
            aria-controls="palette-results"
            aria-expanded="true"
            placeholder="Search title, path, or context"
          />
          <button class="palette-close" type="button" data-action="close-search-palette" aria-label="Close search">
            <svg class="button-icon" viewBox="0 0 20 20" aria-hidden="true">
              <path d="m5.5 5.5 9 9M14.5 5.5l-9 9" />
            </svg>
          </button>
        </div>
        <div class="palette-status" id="palette-status" aria-live="polite"></div>
        <div id="palette-results" class="palette-results" role="listbox" aria-label="Search results"></div>
        <div class="palette-footer">
          <span><kbd>↑</kbd><kbd>↓</kbd> move</span>
          <span><kbd>Enter</kbd> open</span>
          <span><kbd>Esc</kbd> close</span>
          <span><kbd data-shortcut-hint>⌘K</kbd> search</span>
        </div>
      </section>
    </div>

    <script type="module" src="/assets/app.js"></script>
    <!-- ACAC_ANALYTICS -->
  </body>
</html>
